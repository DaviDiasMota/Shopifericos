<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce</title>
    <link rel="stylesheet" href="../css/home.css">
</head>
<body>
    <div class="container">
        <header>
            <h2>SHOPIFERICOS</h2>
            <a href="cadastro.html">Login</a>
        </header>

        <nav>
            <a href="index.html">Home</a>
            <a href="produtos.html">Produtos</a>
            <a href="contato.html">Contato</a>
            <a href="sobre.html">Sobre Nós</a>
        </nav>

        <main>

            <section class="slider">

                <div class="slides">
                    <input type="radio" name="radio-btn" id="radio1">
                    <input type="radio" name="radio-btn" id="radio2">
                    <input type="radio" name="radio-btn" id="radio3">
                    <input type="radio" name="radio-btn" id="radio4">

                    <div class="slide-first">
                        <img src="../assets/img1.jpg" alt="Imagem 1">
                    </div>

                    <div class="slide">
                        <img src="../assets/img2.jpg" alt="Imagem 2">
                    </div>

                    <div class="slide">
                        <img src="../assets/image3.jpg" alt="Imagem 3">
                    </div>

                    <div class="slide">
                        <img src="../assets/img4.jpg" alt="Imagem 4">
                    </div>

                    <div class="navigation-auto">
                        <div class="auto-btn1"></div>
                        <div class="auto-btn2"></div>
                        <div class="auto-btn3"></div>
                        <div class="auto-btn4"></div>
                    </div>
                </div>

                <div class="navigation-manual">
                    <label for="radio1" class="manual-btn"></label>
                    <label for="radio2" class="manual-btn"></label>
                    <label for="radio3" class="manual-btn"></label>
                    <label for="radio4" class="manual-btn"></label>
                </div>
            </section>

            <section class="produtos">
                <h1>Seja Bem-Vindo a Sua Loja de Periféricos</h1>

                <h2>Conheça Nossos Produtos</h2>

                <a href="produtos.html">Produtos</a>
            </section>
        </main>
        
        
    </div>
    <script src="../js/scriptHome.js"></script>

</body>
</html>
